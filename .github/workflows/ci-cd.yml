name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.9"

jobs:
  validate:
    name: Lint, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint checks
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Build workspaces
        run: pnpm build

  docker:
    name: Build and smoke test Docker image
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app for Docker context
        run: pnpm build

      - name: Build Docker image for smoke test
        run: docker build -t solo-leveling-smoke .

      - name: Smoke test Docker image
        run: |
          cid=$(docker run -d \
            -e API_HOST=0.0.0.0 \
            -e API_PORT=3333 \
            -e DATABASE_PATH=/tmp/solo-leveling.sqlite \
            -e SKIP_DISCORD_LOGIN=true \
            -e DISCORD_TOKEN=placeholder \
            -e DISCORD_CLIENT_ID=placeholder \
            -e TRACKED_GUILD_ID=placeholder \
            -e TRACKED_CHANNEL_IDS=placeholder \
            -p 3333:3333 \
            solo-leveling-smoke)
          cleanup() { docker rm -f "$cid" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3333/api/health; then
              exit 0
            fi
            sleep 1
          done
          docker logs "$cid"
          exit 1
